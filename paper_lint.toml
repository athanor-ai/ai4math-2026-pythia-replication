venue = "neurips"

# NOTE on venue preset (asabi to revisit). athanor-builder/tools/paper_lint/venues/
# does not yet ship an ai4math-2026 preset. Available presets:
# fmcad-2026, nature-article, neurips, pldi-2026. The AI4MATH 2026
# CFP at https://ai4math2026.github.io/#cfp does not publish
# independent style files. The workshop sits in the ML-conference
# orbit and prior cycles inherited the host conference template.
# Aidan directive 2026-04-26 selects ICML formatting as the closest
# sane default. We use the neurips preset here (closest live ML
# preset) and override caps below to match AI4MATH workshop scope
# (5-page main body target). Replace with venue = "ai4math-2026"
# when athanor-builder ships the preset, or with venue = "icml-2026"
# if that preset lands first.

[layout]
# Workshop format. AI4MATH 2026 CFP: 4-9 pages main body. Aidan
# directive: target 5 pages main + extensive appendix.
min_words_per_page = 120
page_ink_density_min = 0.02
page_ink_density_top = 0.08
max_overfull_pt = 5.0

[caps]
# Workshop caps. AI4MATH 2026 CFP norms not finalized; using ICML
# 2025 workshop-paper conventions as a sane default.
abstract_max_words = 250
main_text_max_words = 5500
display_items_max = 0
references_max = 0
pages_max = 5

[figures]
root = "figures"
allowed_extensions = ["pdf"]

[hygiene]
root_markdown_whitelist = ["README.md"]
data_readme_required = false

[voice]
disabled_rules = []
strict = false

[numbers]
# No numerical-claims manifest yet; populate during writing phase.
enabled = false

[anonymity]
# Workshop is double-blind. Forbid author names, affiliations, and
# any internal strings that would identify the lab.
enabled = true
forbidden_strings = [
    "Athanor",
    "athanor-ai",
    "athanor-builder",
    "athanor-kairos",
    "@aidan",
    "@sam",
    "@asabi",
    "@platform",
    "@qa",
    "@research",
    "@cto",
    "cto (asabi)",
    "LLM-assisted",
    "LLM-generated",
    "Claude Code",
    "Anthropic internal",
]
forbidden_regexes = [
    "\\bATH-\\d+\\b",
    "github\\.com/athanor-ai",
    "agent-handoffs?/",
    "<@U0[A-Z0-9]+>",
]

[repo_specific_gates]
modules = []
